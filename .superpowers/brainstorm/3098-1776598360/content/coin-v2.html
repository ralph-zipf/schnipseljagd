<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kurfürst Maximilian – Arcane Coin</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #080810;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 40px 20px;
    font-family: 'Cinzel', Georgia, serif;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 40% 30%, rgba(100,50,160,0.14) 0%, transparent 55%),
      radial-gradient(ellipse at 70% 75%, rgba(0,130,160,0.08) 0%, transparent 50%);
    pointer-events: none;
  }
  h2 {
    font-size: 12px; letter-spacing: 5px; text-transform: uppercase;
    background: linear-gradient(120deg, #c890f0 0%, #78c4de 50%, #e8aa38 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    text-align: center;
  }
  .subtitle { font-size: 10px; color: #4a3870; letter-spacing: 2px; text-align: center; margin-top: 4px; }

  /* ── Coin container: round only ── */
  .coin-stage {
    position: relative;
    width: 260px; height: 260px;
    border-radius: 50%;
    /* ambient glow around the coin */
    filter: drop-shadow(0 0 28px rgba(160,90,255,0.35)) drop-shadow(0 0 8px rgba(220,170,50,0.2));
  }

  /* All shard SVGs share the same stage */
  .shard-svg {
    position: absolute; inset: 0;
    width: 260px; height: 260px;
    transition: opacity 0.7s ease, filter 0.7s ease, transform 0.7s ease;
  }
  .shard-svg.hidden {
    opacity: 0;
    filter: brightness(0) blur(3px);
    transform: scale(0.97);
  }
  .shard-svg.visible {
    opacity: 1;
    filter: none;
    transform: scale(1);
  }

  /* crack overlay always on top */
  .crack-overlay {
    position: absolute; inset: 0;
    width: 260px; height: 260px;
    pointer-events: none;
    z-index: 20;
  }

  /* controls */
  .controls { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .status { font-size: 10px; color: #5a4888; letter-spacing: 2px; }
  .status em { color: #b090e0; font-style: normal; }
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn5 { grid-column: span 2; }
  .btn {
    padding: 9px 18px; border-radius: 20px;
    border: 1px solid rgba(130,70,220,0.4);
    background: rgba(30,15,55,0.7);
    color: #a070d0; font-family: 'Cinzel', serif;
    font-size: 10px; letter-spacing: 1px; cursor: pointer;
    transition: all 0.25s; text-align: center;
  }
  .btn:hover { background: rgba(70,30,120,0.6); border-color: rgba(170,100,255,0.6); }
  .btn.done { background: rgba(90,30,180,0.35); border-color: rgba(180,120,255,0.65); color: #d0a8f8; }
  .reset {
    margin-top: 4px; padding: 6px 16px; border-radius: 20px;
    border: 1px solid rgba(60,40,100,0.35); background: transparent;
    color: #382858; font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 1px; cursor: pointer;
  }
</style>
</head>

<div class="controls">
  <div class="status">Schnipsel enthüllt: <em id="cnt">0</em> / 5</div>
  <div class="btn-grid">
    <button class="btn" id="b1" onclick="reveal(1,3)">Station 1 lösen</button>
    <button class="btn" id="b2" onclick="reveal(2,1)">Station 2 lösen</button>
    <button class="btn" id="b3" onclick="reveal(3,5)">Station 3 lösen</button>
    <button class="btn" id="b4" onclick="reveal(4,2)">Station 4 lösen</button>
    <button class="btn btn5" id="b5" onclick="reveal(5,4)">Station 5 lösen</button>
  </div>
  <button class="reset" onclick="resetAll()">↺ zurücksetzen</button>
</div>

<script>
  let count = 0;
  const done = {};

  function reveal(station, shard) {
    if (done[station]) return;
    done[station] = true;
    count++;
    document.getElementById('cnt').textContent = count;
    if (count >= 5) document.getElementById('darkBg').style.opacity = '0';

    const el = document.getElementById('sh' + shard);
    el.classList.remove('hidden');
    el.classList.add('visible');

    // brief flash
    el.style.filter = 'brightness(2) drop-shadow(0 0 14px rgba(200,140,255,0.9))';
    setTimeout(() => { el.style.filter = ''; }, 700);

    const btn = document.getElementById('b' + station);
    btn.classList.add('done');
    btn.textContent = '✓ Station ' + station;
  }

  function resetAll() {
    count = 0; Object.keys(done).forEach(k => delete done[k]);
    document.getElementById('cnt').textContent = 0;
    document.getElementById('darkBg').style.opacity = '1';
    for (let i = 1; i <= 5; i++) {
      document.getElementById('sh' + i).classList.remove('visible');
      document.getElementById('sh' + i).classList.add('hidden');
      const b = document.getElementById('b' + i);
      b.classList.remove('done');
      b.textContent = 'Station ' + i + ' lösen';
    }
  }
</script>
